<!DOCTYPE html>
<html>
<head>
  <title>Dijkstra Navigator</title>

  <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    #map {
      height: 80vh;
      width: 100%;
    }

    button {
      padding: 10px;
      margin: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>🚀 Dijkstra Navigator</h2>
<p>Click on map to select start and end</p>

<button onclick="findPath()">Find Path</button>
<button onclick="resetMap()">Reset</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([22.5726, 88.3639], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  let startCoords = null;
  let endCoords = null;

  let startMarker = null;
  let endMarker = null;
  let polyline = null;

  // Click to select points
  map.on('click', function(e) {
    const { lat, lng } = e.latlng;

    if (!startCoords) {
      startCoords = [lat, lng];
      startMarker = L.marker(startCoords).addTo(map)
        .bindPopup("Start").openPopup();
    } else if (!endCoords) {
      endCoords = [lat, lng];
      endMarker = L.marker(endCoords).addTo(map)
        .bindPopup("End").openPopup();
    }
  });

  function findPath() {
    if (!startCoords || !endCoords) {
      alert("Select start and end points!");
      return;
    }

    fetch("http://localhost:5000/shortest-path", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        start: startCoords,
        end: endCoords
      })
    })
    .then(res => res.json())
    .then(data => {
      drawPath(data.path);
    })
    .catch(err => {
      console.error(err);
      alert("Error connecting to backend");
    });
  }

  function drawPath(path) {
    if (polyline) map.removeLayer(polyline);

    polyline = L.polyline(path, {
      color: 'blue',
      weight: 5
    }).addTo(map);

    map.fitBounds(polyline.getBounds());
  }

  function resetMap() {
    if (startMarker) map.removeLayer(startMarker);
    if (endMarker) map.removeLayer(endMarker);
    if (polyline) map.removeLayer(polyline);

    startCoords = null;
    endCoords = null;
    startMarker = null;
    endMarker = null;
    polyline = null;
  }
</script>

</body>
</html>
