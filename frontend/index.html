<!DOCTYPE html>
<html>
<head>
  <title>Kolkata Pathfinder</title>

  <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    #map { height: 90vh; }
    button { margin: 10px; padding: 10px; }
  </style>
</head>

<body>

<h2>Kolkata Shortest Path</h2>
<button onclick="findPath()">Find Path</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([22.5726, 88.3639], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  const coords = {
    A: [22.5726, 88.3639],
    B: [22.5750, 88.3700],
    C: [22.5800, 88.3600],
    D: [22.5850, 88.3650]
  };

  let polyline;

  function findPath() {
    fetch("http://localhost:5000/shortest-path", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        start: "A",
        end: "D"
      })
    })
    .then(res => res.json())
    .then(data => {
      drawPath(data.path);
    });
  }

  function drawPath(path) {
    if (polyline) map.removeLayer(polyline);

    let latlngs = path.map(node => coords[node]);

    polyline = L.polyline(latlngs, { color: 'blue' })
      .addTo(map);

    map.fitBounds(polyline.getBounds());
  }
</script>

</body>
</html>
