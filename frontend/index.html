<!DOCTYPE html>
<html>
<head>
  <title>Dijkstra Navigator</title>

  <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    #map {
      height: 85vh;
      width: 100%;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>🚀 Dijkstra Navigator</h2>
<p>Interactive Shortest Path Visualizer using Graph Algorithms</p>
<p>Click on map to select Start & End points</p>
<p id="distanceText"></p>

<button onclick="resetMap()">Reset</button>
<button id="routeBtn" onclick="findPath()">Find Path</button>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([22.5726, 88.3639], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  let startCoords = null;
  let endCoords = null;

  let startMarker = null;
  let endMarker = null;
  let polyline = null;

  // Click to select points
map.on('click', function(e) {
  const { lat, lng } = e.latlng;

  if (!startCoords) {
    startCoords = [lat, lng];
    startMarker = L.marker(startCoords).addTo(map)
      .bindPopup("📍 Start Location")
      .openPopup();
  } else if (!endCoords) {
    endCoords = [lat, lng];
    endMarker = L.marker(endCoords).addTo(map)
      .bindPopup("🏁 End Location")
      .openPopup();
  }
});

function findPath() {
  if (!startCoords || !endCoords) {
    alert("⚠️ Please select both points!");
    return;
  }

  fetch("http://127.0.0.1:5000/shortest-path", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      start: startCoords,
      end: endCoords
    })
  })
    .then(res => {
      if (!res.ok) throw new Error("Server error");
      return res.json();
    })
    .then(data => {
      drawPath(data.path);
      document.getElementById("distanceText").textContent = `Distance: ${data.distance} km`;
    })
    .catch(err => {
      console.error("🔥 ERROR:", err);
      alert("Backend not connected. Check server.");
    });
  }

  function drawPath(path) {
    if (polyline) map.removeLayer(polyline);

    polyline = L.polyline(path, {
      color: 'blue',
      weight: 5
    }).addTo(map);

    map.fitBounds(polyline.getBounds());
  }

  function resetMap() {
    if (startMarker) map.removeLayer(startMarker);
    if (endMarker) map.removeLayer(endMarker);
    if (polyline) map.removeLayer(polyline);

    startCoords = null;
    endCoords = null;
    startMarker = null;
    endMarker = null;
    polyline = null;
  }
</script>

</body>
</html>
